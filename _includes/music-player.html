{% assign tracks = site.data.music %}
{% assign first_track = tracks | first %}
{% if first_track %}
<section class="music-player" data-music-player aria-label="Music player">
  <div class="music-player-header">
    <div class="music-player-heading">
      <span class="music-label">Music</span>
      <strong data-track-title>{{ first_track.title }}</strong>
      <p class="meta" data-track-meta>{{ first_track.size }}</p>
    </div>
    <div class="music-window-actions">
      <a class="button ghost" href="{{ first_track.url | relative_url }}" download data-track-download>Download</a>
      <button class="music-toggle-button" type="button" data-player-toggle aria-expanded="false">List</button>
      <button class="music-toggle-button" type="button" data-player-hide>Hide</button>
    </div>
  </div>

  <audio preload="metadata" src="{{ first_track.url | relative_url }}" data-audio></audio>
  <div class="music-controls">
    <button class="music-play-button" type="button" data-play-button aria-label="Play">Play</button>
    <div class="music-timeline">
      <input class="music-progress" type="range" min="0" max="100" value="0" step="0.1" aria-label="Track progress" data-progress>
      <div class="music-time">
        <time data-current-time>0:00</time>
        <time data-duration>0:00</time>
      </div>
    </div>
  </div>
  <ol class="music-list" data-player-panel>
    {% for track in tracks %}
      <li>
        <button
          class="music-track{% if forloop.first %} is-active{% endif %}"
          type="button"
          data-track
          data-src="{{ track.url | relative_url }}"
          data-title="{{ track.title | escape }}"
          data-size="{{ track.size | escape }}"
          data-download="{{ track.url | relative_url }}"
        >
          <span>{{ track.title }}</span>
          <small>{{ track.size }}</small>
        </button>
      </li>
    {% endfor %}
  </ol>
</section>
<button class="music-player-launcher" type="button" data-player-launcher hidden>Music</button>
{% endif %}
