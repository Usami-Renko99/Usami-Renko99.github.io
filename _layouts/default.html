<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/page-transitions.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/music-player.js' | relative_url }}" defer></script>
    {% include mathjax.html %}
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        {% include nav.html %}
      </div>
    </header>

    <main class="container page-content">
      {{ content }}
    </main>

    {% include music-player.html %}

  </body>
</html>
