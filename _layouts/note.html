---
layout: page
---

<article class="note">
  <header class="note-header">
    <h1 class="note-title">{{ page.title }}</h1>
    {% if page.topic or page.tags %}
    <p class="note-meta">
      {% if page.topic %}<span>{{ page.topic }}</span>{% endif %}
      {% if page.tags %}
        ·
        {% for tag in page.tags %}<span class="tag">#{{ tag }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}
      {% endif %}
    </p>
    {% endif %}
  </header>

  <div class="note-content">
    {{ content }}
  </div>
</article>
